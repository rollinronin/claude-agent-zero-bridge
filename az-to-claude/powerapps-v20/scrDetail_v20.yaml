      # RAID GALLERY Y=258 H=424
      - galRAID:
          Control: Gallery
          Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
          Properties:
            X: =0
            Y: =258
            Width: =Parent.Width
            Height: =424
            Items: =Filter(
              colRAID,
              If(gFilterRAIDType = "All", true, Type = gFilterRAIDType),
              If(gSelectedProject = "", true, ProjectID = gSelectedProject)
            )
            TemplateSize: =64
            ShowScrollbar: =true
            BorderColor: =RGBA(0,0,0,0)
            BorderThickness: =0
            Fill: =RGBA(0,0,0,0)
            WrapCount: =1
          Children:

            # Row background
            - rcvtRRowBg:
                Control: Rectangle
                Properties:
                  X: =0
                  Y: =0
                  Width: =Parent.TemplateWidth
                  Height: =Parent.TemplateHeight
                  Fill: =If(IsEven(ThisItem.ItemIndex), cSurface, cSurfaceAlt)
                  BorderColor: =cBorderLight
                  BorderThickness: =1

            # Left 5px border — RAID type color
            - rcvtRTypeBdr:
                Control: Rectangle
                Properties:
                  X: =0
                  Y: =0
                  Width: =5
                  Height: =Parent.TemplateHeight
                  Fill: =Switch(
                    ThisItem.Type,
                    "Risk",     cRAIDRiskBdr,
                    "Issue",    cRAIDIssueBdr,
                    "Action",   cRAIDActBdr,
                    "Decision", cRAIDDecBdr,
                    cBorderMed
                  )

            # Type pill background
            - rcvtRTypePillBg:
                Control: Rectangle
                Properties:
                  X: =10
                  Y: =20
                  Width: =84
                  Height: =24
                  Fill: =Switch(
                    ThisItem.Type,
                    "Risk",     cRAIDRiskBg,
                    "Issue",    cRAIDIssueBg,
                    "Action",   cRAIDActBg,
                    "Decision", cRAIDDecBg,
                    cRAGGreyBg
                  )
                  RadiusTopLeft: =12
                  RadiusTopRight: =12
                  RadiusBottomLeft: =12
                  RadiusBottomRight: =12

            # Type pill label
            - lblRType:
                Control: Label
                Properties:
                  X: =10
                  Y: =20
                  Width: =84
                  Height: =24
                  Text: =Upper(Left(ThisItem.Type, 3))
                  Color: =Switch(
                    ThisItem.Type,
                    "Risk",     cRAIDRiskFg,
                    "Issue",    cRAIDIssueFg,
                    "Action",   cRAIDActFg,
                    "Decision", cRAIDDecFg,
                    cRAGGrey
                  )
                  Font: ='Segoe UI'
                  FontWeight: =FontWeight.Bold
                  Size: =8
                  LetterSpacing: =1
                  Align: =Align.Center
                  VerticalAlign: =VerticalAlign.Middle

            # RAID ID
            - lblRID:
                Control: Label
                Properties:
                  X: =104
                  Y: =10
                  Width: =108
                  Height: =44
                  Text: =If(IsBlank(ThisItem.RAIDID), Text(ThisItem.ID), ThisItem.RAIDID)
                  Color: =cTextSub
                  Font: ='Segoe UI'
                  FontWeight: =FontWeight.Normal
                  Size: =10
                  VerticalAlign: =VerticalAlign.Middle

            # Title
            - lblRTitle:
                Control: Label
                Properties:
                  X: =220
                  Y: =8
                  Width: =620
                  Height: =48
                  Text: =ThisItem.Title
                  Color: =cTextDark
                  Font: ='Segoe UI'
                  FontWeight: =FontWeight.Semibold
                  Size: =11
                  VerticalAlign: =VerticalAlign.Middle
                  Overflow: =Overflow.Hidden

            # Owner
            - lblROwner:
                Control: Label
                Properties:
                  X: =850
                  Y: =10
                  Width: =140
                  Height: =44
                  Text: =If(IsBlank(ThisItem.Owner), "--", ThisItem.Owner)
                  Color: =cTextBody
                  Font: ='Segoe UI'
                  FontWeight: =FontWeight.Normal
                  Size: =10
                  VerticalAlign: =VerticalAlign.Middle

            # Status badge background
            - rcvtRStatusBg:
                Control: Rectangle
                Properties:
                  X: =1000
                  Y: =20
                  Width: =90
                  Height: =24
                  Fill: =If(ThisItem.Status = "Open", cRAGAmberBg, cRAGGreenBg)
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8

            # Status label
            - lblRStatus:
                Control: Label
                Properties:
                  X: =1000
                  Y: =20
                  Width: =90
                  Height: =24
                  Text: =ThisItem.Status
                  Color: =If(ThisItem.Status = "Open", cRAGAmber, cRAGGreen)
                  Font: ='Segoe UI'
                  FontWeight: =FontWeight.Bold
                  Size: =9
                  Align: =Align.Center
                  VerticalAlign: =VerticalAlign.Middle

            # Due date (red if overdue + open)
            - lblRDue:
                Control: Label
                Properties:
                  X: =1100
                  Y: =10
                  Width: =252
                  Height: =44
                  Text: =If(
                    IsBlank(ThisItem.DueDate),
                    "--",
                    Text(DateValue(ThisItem.DueDate), "[$-en-US]mm/dd/yyyy")
                  )
                  Color: =If(
                    Not(IsBlank(ThisItem.DueDate)) And
                    DateValue(ThisItem.DueDate) < Today() And
                    ThisItem.Status = "Open",
                    cRAGRed,
                    cTextBody
                  )
                  Font: ='Segoe UI'
                  FontWeight: =FontWeight.Normal
                  Size: =10
                  VerticalAlign: =VerticalAlign.Middle

