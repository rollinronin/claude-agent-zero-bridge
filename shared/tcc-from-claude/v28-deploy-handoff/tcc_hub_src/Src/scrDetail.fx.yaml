            FontWeight: =FontWeight.Normal
            Size: =10
            VerticalAlign: =VerticalAlign.Middle
        rcvtRStatusBg As rectangle:
            X: =1000
            Y: =20
            Width: =90
            Height: =24
            Fill: =If(ThisItem.Status.Value = "Open", cRAGAmberBg, cRAGGreenBg)
