    "galRAID As gallery.'BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0'":
        X: =0
        Y: =258
        Width: =Parent.Width
        Height: =424
        Items: =Filter( colRAID, If(gFilterRAIDType = "All", true, 'RAID Type'.Value = gFilterRAIDType), If(gSelectedProject = "", true, Project.Value = gSelectedProject) )
        TemplateSize: =64
        ShowScrollbar: =true
        BorderColor: =RGBA(0,0,0,0)
        BorderThickness: =0
        Fill: =RGBA(0,0,0,0)
        WrapCount: =1
        rcvtRRowBg As rectangle:
            X: =0
            Y: =0
            Width: =Parent.TemplateWidth
            Height: =Parent.TemplateHeight
            Fill: =cSurface
            BorderColor: =cBorderLight
            BorderThickness: =1
        rcvtRTypeBdr As rectangle:
            X: =0
            Y: =0
            Width: =5
            Height: =Parent.TemplateHeight
            Fill: =Switch( ThisItem.'RAID Type'.Value, "Risk",     cRAIDRiskBdr, "Issue",    cRAIDIssueBdr, "Action",   cRAIDActBdr, "Decision", cRAIDDecBdr, cBorderMed )
        rcvtRTypePillBg As rectangle:
            X: =10
            Y: =20
            Width: =84
            Height: =24
            Fill: =Switch( ThisItem.'RAID Type'.Value, "Risk",     cRAIDRiskBg, "Issue",    cRAIDIssueBg, "Action",   cRAIDActBg, "Decision", cRAIDDecBg, cRAGGreyBg )
            RadiusTopLeft: =12
            RadiusTopRight: =12
            RadiusBottomLeft: =12
            RadiusBottomRight: =12
        lblRType As label:
            X: =10
            Y: =20
            Width: =84
            Height: =24
            Text: =Upper(Left(ThisItem.'RAID Type'.Value, 3))
            Color: =Switch( ThisItem.'RAID Type'.Value, "Risk",     cRAIDRiskFg, "Issue",    cRAIDIssueFg, "Action",   cRAIDActFg, "Decision", cRAIDDecFg, cRAGGrey )
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Size: =8
            LetterSpacing: =1
            Align: =Align.Center
            VerticalAlign: =VerticalAlign.Middle
        lblRID As label:
            X: =104
            Y: =10
            Width: =108
            Height: =44
            Text: =Text(ThisItem.ID)
            Color: =cTextSub
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Normal
            Size: =10
            VerticalAlign: =VerticalAlign.Middle
        lblRTitle As label:
            X: =220
            Y: =8
            Width: =620
            Height: =48
            Text: =ThisItem.Title
            Color: =cTextDark
            Font: =Font.'Segoe UI'
