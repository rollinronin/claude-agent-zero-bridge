        Height: =80
        Fill: =RGBA(0,0,0,0)
        AccessibleLabel: =Concatenate("Decisions required band. ", Text(CountRows(gDecisions)), " open decisions.")
        HtmlText: |-
            ="<div style='padding:8px 24px;background:#FFF3E0;border-left:4px solid #F57C00;font-family:Segoe UI,Arial,sans-serif;height:100%;box-sizing:border-box;display:flex;flex-direction:column;gap:4px'><div style='font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#F57C00;font-weight:700'>&#9888; DECISIONS REQUIRED (" & CountRows(gDecisions) & ")</div><div style='display:grid;grid-template-columns:repeat(4,1fr);gap:8px'>" & Concat(gDecisions, "<div style='background:" & ColorBg & ";border-left:3px solid " & ColorFg & ";border-radius:4px;padding:6px 10px;display:flex;flex-direction:column;gap:2px'><div style='font-size:10px;font-weight:700;color:" & ColorFg & ";letter-spacing:.04em'>" & Code & "</div><div style='font-size:11px;color:#343A40;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.35'>" & Title & "</div></div>", "") & If(CountRows(gDecisions) = 0, "<div style='padding:6px 10px;color:#757575;font-size:11px;font-style:italic'>No open decisions at this time.</div>", "") & "</div></div>"
    htmlPortfolioTrack As htmlViewer:
        X: =0
        Y: =219
        Width: =Parent.Width
        Height: =80
        Fill: =RGBA(0,0,0,0)
        AccessibleLabel: ="Portfolio milestone timeline. Shows construction and IS gates from kickoff through project complete, with today marker."
        HtmlText: |-
            ="<div style='padding:6px 24px 8px 24px;background:#FCFCFC;border-top:1px solid #D6D6D6;border-bottom:1px solid #D6D6D6;font-family:Segoe UI,Arial,sans-serif;height:100%;box-sizing:border-box;display:flex;flex-direction:column;gap:2px'><div style='display:flex;justify-content:space-between;align-items:center'><div style='font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#043971;font-weight:700'>CONSTRUCTION &amp; IS MILESTONES  <span style='background:#DBEAFE;color:#1E40AF;padding:1px 6px;border-radius:8px;margin-left:4px;font-size:9px'>" & CountRows(gPortfolioGates) & " gates</span></div><div style='font-size:9px;color:#9CA3AF;font-family:Consolas,monospace'>" & Text(gPortfolioStart, "[$-en-US]mmm yyyy") & " &ndash; " & Text(gPortfolioEnd, "[$-en-US]mmm yyyy") & "</div></div><div style='position:relative;flex:1;margin:6px 12px 0 12px'><div style='position:absolute;top:10px;left:0;right:0;height:3px;background:#E5E7EB;border-radius:2px'></div>" & Concat(gPortfolioGates, "<div style='position:absolute;top:0;left:" & LeftPct & "%'><div style='width:18px;height:18px;border-radius:9px;background:" & Switch(Status, "complete", "#2E7D32", "active", "#FFFFFF", "blocked", "#C62828", "#E5E7EB") & ";border:3px solid " & Switch(Status, "complete", "#2E7D32", "active", "#0054A4", "blocked", "#C62828", "#D6D6D6") & ";box-shadow:" & If(Status = "active", "0 0 0 3px rgba(0,84,164,0.18)", "none") & ";transform:translateX(-50%)'></div><div style='font-size:9px;font-weight:600;color:#252525;margin-top:3px;white-space:nowrap;line-height:1.1;transform:" & If(LeftPct >= 92, "translateX(-100%)", LeftPct <= 8, "translateX(0)", "translateX(-50%)") & ";text-align:" & If(LeftPct >= 92, "right", LeftPct <= 8, "left", "center") & "'>" & Label & "</div><div style='font-size:8px;color:#6B7280;font-family:Consolas,monospace;line-height:1;transform:" & If(LeftPct >= 92, "translateX(-100%)", LeftPct <= 8, "translateX(0)", "translateX(-50%)") & ";text-align:" & If(LeftPct >= 92, "right", LeftPct <= 8, "left", "center") & "'>" & TargetLabel & "</div></div>", "") & "<div style='position:absolute;top:-2px;left:" & gPortfolioTodayPct & "%;width:2px;height:26px;background:#C62828;transform:translateX(-50%)'></div><div style='position:absolute;top:-14px;left:" & gPortfolioTodayPct & "%;transform:translateX(-50%);font-size:8px;color:#C62828;font-weight:700;letter-spacing:.05em;white-space:nowrap'>TODAY</div></div></div>"
