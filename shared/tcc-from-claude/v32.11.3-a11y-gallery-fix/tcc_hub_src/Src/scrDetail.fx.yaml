    "galRAID As gallery.'BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0'":
        X: =0
        Y: =258
        Width: =Parent.Width
        Height: =424
        Items: =Filter( colRAID, If(gFilterRAIDType = "All", true, 'RAID Type'.Value = gFilterRAIDType), If(gSelectedProject = "", true, Project.Value = gSelectedProject) )
        Layout: =Layout.Vertical
        TemplateSize: =64
        ShowScrollbar: =true
        BorderColor: =RGBA(0,0,0,0)
        BorderThickness: =0
        Fill: =RGBA(0,0,0,0)
        WrapCount: =1
        AccessibleLabel: =Concatenate("RAID log. ", Text(CountRows(galRAID.AllItems)), " items showing for ", If(gSelectedProject = "", "all projects", gSelectedProject), ", filter ", gFilterRAIDType, ".")
        TabIndex: =0
        htmlRaidRow As htmlViewer:
            X: =0
            Y: =0
            Width: =Parent.TemplateWidth
            Height: =Parent.TemplateHeight
            Fill: =RGBA(0,0,0,0)
            AccessibleLabel: =Concatenate(ThisItem.'RAID Type'.Value, " ", Text(ThisItem.ID), ". ", ThisItem.Title, ". Status ", ThisItem.Status.Value, ".")
            HtmlText: |-
                =With({_tb:Switch(ThisItem.'RAID Type'.Value,"Risk","#FFEBEE","Issue","#FFF3E0","Action","#E3F2FD","Decision","#EDE9FE","#F5F5F4"),_tf:Switch(ThisItem.'RAID Type'.Value,"Risk","#C62828","Issue","#F57C00","Action","#0054A4","Decision","#5B21B6","#757575"),_tl:Switch(ThisItem.'RAID Type'.Value,"Risk","RIS","Issue","ISS","Action","ACT","Decision","DEC","---"),_sb:Switch(ThisItem.Status.Value,"Open","#FFF3E0","Closed","#E8F5E9","In Progress","#E3F2FD","#F5F5F4"),_sf:Switch(ThisItem.Status.Value,"Open","#F57C00","Closed","#2E7D32","In Progress","#0054A4","#757575"),_dc:If(Not(IsBlank(ThisItem.DueDate)) And DateValue(ThisItem.DueDate) < Today() And ThisItem.Status.Value = "Open", "#C62828", "#6B7280"),_bg:If(Mod(ThisItem.ID, 2) = 0, "#FCFCFC", "#F1F3F7")},"<div style='display:grid;grid-template-columns:60px 50px 1fr 160px 100px 110px;gap:12px;align-items:center;padding:6px 16px;background:" & _bg & ";border-bottom:1px solid #EDEDED;border-left:3px solid " & _tf & ";font-family:Segoe UI,Arial,sans-serif;height:100%;box-sizing:border-box'><div style='text-align:center'><span style='display:inline-block;padding:3px 10px;border-radius:3px;background:" & _tb & ";color:" & _tf & ";font-size:10px;font-weight:700;letter-spacing:.05em'>" & _tl & "</span></div><div style='font-size:10px;color:#757575;font-family:Consolas,monospace'>#" & ThisItem.ID & "</div><div style='font-size:12px;color:#343A40;overflow:hidden'>" & ThisItem.Title & "</div><div style='font-size:11px;color:#6B7280'>" & If(IsBlank(ThisItem.Owner), "--", ThisItem.Owner.DisplayName) & "</div><div style='text-align:center'><span style='padding:2px 10px;border-radius:3px;background:" & _sb & ";color:" & _sf & ";font-size:10px;font-weight:700'>" & ThisItem.Status.Value & "</span></div><div style='font-size:10px;color:" & _dc & ";font-family:Consolas,monospace'>" & If(IsBlank(ThisItem.DueDate), "--", Text(DateValue(ThisItem.DueDate), "[$-en-US]mm/dd/yyyy")) & "</div></div>")
